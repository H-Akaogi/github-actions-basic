name: Path Trigger Workflow
on: [workflow_dispatch] # このワークフローを手動実行できるようにする
#  push: # mainブランチへのPush、かつ src/以下の変更がある場合のみ実行
#    branches:
#      - main       # mainブランチにPushされた時のみ対象
#    paths:
#      - 'src/**'   #  srcディレクトリ配下に変更があった時のみ起動する

jobs:
  path-job:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト # 、リポジトリの最新のコードをランナー上に展開(チェックアウト)する
        uses: actions/checkout@v4

      - name: srcディレクトリ内のファイル確認
        run: |
          echo "=== src/sample.txt の中身を出力します ==="
          cat src/sample.txt