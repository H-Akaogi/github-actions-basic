name: Checkout Check Workflow   # チェックアウト確認用のワークフロー
on: [workflow_dispatch]

jobs:
  # ① チェックアウトを【しない】ジョブ
  without-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: ディレクトリの確認（Checkoutなし）
        run: |
          echo "=== Checkoutしていない状態のファイル一覧 ==="
          ls -la

  # ② チェックアウトを【する】ジョブ
  with-checkout: # 仮想マシンを用意
    runs-on: ubuntu-latest 
    steps: 
      - name: リポジトリのチェックアウト # 最初のステップでリポジトリの内容をコピー
        uses: actions/checkout@v4 # @v4はアクションのバージョンを指定

      - name: ディレクトリの確認（Checkoutあり） # コマンドでコピーを確認
        run: |
          echo "=== Checkoutした状態のファイル一覧 ===" 
          ls -la